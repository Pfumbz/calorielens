name: calorielens
description: AI-powered calorie scanner and nutrition coach
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Storage
  shared_preferences: ^2.2.3

  # Networking
  http: ^1.2.0

  # Camera & image picking
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.68.0

  # Cached network images (exercise photos)
  cached_network_image: ^3.3.1

  # Date formatting
  intl: ^0.19.0

  # State management
  provider: ^6.1.2

  # Icons
  cupertino_icons: ^1.0.6

  # Backend & Auth
  supabase_flutter: ^2.5.0
  google_sign_in: ^6.2.1

  # URL launching (for retailer deep links)
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
