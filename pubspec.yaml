name: calorielens
description: AI-powered calorie scanner and nutrition coach
publish_to: 'none'
version: 1.2.1+4

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Storage
  shared_preferences: ^2.2.3

  # Networking
  http: ^1.2.0

  # Camera & image picking
  image_picker: ^1.1.2

  # Barcode scanning
  mobile_scanner: ^6.0.2

  # Charts
  fl_chart: ^0.68.0

  # Cached network images (exercise photos)
  cached_network_image: ^3.3.1

  # Date formatting
  intl: ^0.19.0

  # State management
  provider: ^6.1.2

  # Icons
  cupertino_icons: ^1.0.6

  # Backend & Auth
  supabase_flutter: ^2.5.0
  google_sign_in: ^6.2.1

  # URL launching
  url_launcher: ^6.2.5

  # Local notifications (meal reminders & coaching nudges)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Ads (Google AdMob)
  google_mobile_ads: ^5.3.0

  # In-app purchases (Google Play Billing)
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app-icon.png"
  adaptive_icon_background: "#FC9818"
  adaptive_icon_foreground: "assets/app-icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo_small.png
